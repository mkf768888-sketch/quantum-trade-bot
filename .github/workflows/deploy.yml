name: Test & Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests (43 checks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run test suite
        env:
          KUCOIN_API_KEY: test_key
          KUCOIN_API_SECRET: test_secret
          KUCOIN_PASSPHRASE: test_pass
          BOT_TOKEN: "0:test"
          TELEGRAM_CHAT_ID: "123"
          API_SECRET: test_api_secret_32chars_xxxxxxxxx
          ANTHROPIC_API_KEY: sk-test
        run: |
          pytest test_server.py -v --tb=short

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test  # только если тесты прошли
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach

      - name: Deployment summary
        run: |
          echo "✅ Deployed successfully to Railway"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"
